server.port=8080
spring.application.name=Smart Home API

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/smarthome
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA:
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev}
app.jwt.access-ttl-seconds=900
app.jwt.refresh-ttl-seconds=1209600
